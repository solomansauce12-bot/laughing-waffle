<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>LarpAuth — Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="js-shield"></span>
      <span class="sidebar-logo-text">Larp<span>Auth</span></span>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Overview</div>
      <a class="nav-item" data-page="dashboard.html" href="dashboard.html">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Management</div>
      <a class="nav-item" data-page="applications.html" href="applications.html">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        Applications
      </a>
      <a class="nav-item" data-page="licenses.html" href="licenses.html">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 7h3a5 5 0 0 1 0 10h-3m-6 0H6A5 5 0 0 1 6 7h3"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Licenses
      </a>
      <a class="nav-item" data-page="users.html" href="users.html">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Users
      </a>
      <a class="nav-item nav-owner-only" data-page="invites.html" href="invites.html">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
        Invite Codes
      </a>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Account</div>
      <a class="nav-item" data-page="settings.html" href="settings.html">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </a>
    </div>

    <div class="sidebar-bottom">
      <div class="user-chip">
        <div class="user-avatar js-owner-initials">A</div>
        <div>
          <div class="name js-owner-name">Admin</div>
          <div class="role js-role-label">Owner</div>
        </div>
        <svg onclick="logout()" title="Logout" style="margin-left:auto;cursor:pointer;color:var(--text-muted);" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </div>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <button id="sidebar-toggle" class="btn btn-icon btn-ghost" style="display:none">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="topbar-title">Dashboard</span>
      <span class="ml-auto text-sm text-muted" id="topbar-date"></span>
    </header>

    <div class="page-content">
      <div class="page-header">
        <div>
          <h1>Overview</h1>
          <p>Your LarpAuth system at a glance.</p>
        </div>
      </div>

      <!-- Stats -->
      <div class="grid-4" style="margin-bottom:1.5rem;">
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(37,99,235,.1);color:var(--blue-light);">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          </div>
          <div class="stat-value" id="stat-apps">0</div>
          <div class="stat-label">Applications</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(16,185,129,.1);color:var(--success);">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          </div>
          <div class="stat-value" id="stat-users">0</div>
          <div class="stat-label">Total Users</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(245,158,11,.1);color:var(--warning);">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 7h3a5 5 0 0 1 0 10h-3m-6 0H6A5 5 0 0 1 6 7h3"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          </div>
          <div class="stat-value" id="stat-licenses">0</div>
          <div class="stat-label">Licenses</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(239,68,68,.1);color:var(--danger);">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <div class="stat-value" id="stat-banned">0</div>
          <div class="stat-label">Banned Users</div>
        </div>
      </div>

      <!-- Recent logs -->
      <div class="card">
        <div class="card-header">
          <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span class="card-title">Recent Activity</span>
          <a href="#" class="btn btn-ghost btn-sm" style="margin-left:auto;">View all</a>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Action</th><th>User</th><th>Application</th><th>IP Address</th><th>Status</th><th>Time</th>
              </tr>
            </thead>
            <tbody id="log-tbody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="app.js"></script>
<script>
function logout() { DB.del('la_authed'); window.location.href = 'login.html'; }

document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });

document.addEventListener('DOMContentLoaded', () => {
  const apps     = DB.get('la_apps', []);
  const users    = DB.get('la_users', []);
  const licenses = DB.get('la_licenses', []);
  const logs     = DB.get('la_logs', []);

  document.getElementById('stat-apps').textContent     = apps.length;
  document.getElementById('stat-users').textContent    = users.length;
  document.getElementById('stat-licenses').textContent = licenses.length;
  document.getElementById('stat-banned').textContent   = users.filter(u => u.banned).length;

  const tbody = document.getElementById('log-tbody');
  if (!logs.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="text-muted text-sm" style="padding:1.5rem;text-align:center;">No activity yet.</td></tr>`;
  } else {
    tbody.innerHTML = logs.slice().reverse().map(l => `
      <tr>
        <td class="font-semibold">${l.action}</td>
        <td>${l.username || '—'}</td>
        <td><span class="badge badge-blue">${l.app}</span></td>
        <td class="text-dim text-sm">${l.ip || '—'}</td>
        <td>${l.ok ? '<span class="badge badge-green">OK</span>' : '<span class="badge badge-red">Fail</span>'}</td>
        <td class="text-muted text-sm">${fmtDate(l.ts)}</td>
      </tr>`).join('');
  }
});
</script>
</body>
</html>
