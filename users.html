<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>LarpAuth — Users</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="js-shield"></span>
      <span class="sidebar-logo-text">Larp<span>Auth</span></span>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Overview</div>
      <a class="nav-item" data-page="dashboard.html" href="dashboard.html">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Management</div>
      <a class="nav-item" data-page="applications.html" href="applications.html">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        Applications
      </a>
      <a class="nav-item" data-page="licenses.html" href="licenses.html">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 7h3a5 5 0 0 1 0 10h-3m-6 0H6A5 5 0 0 1 6 7h3"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Licenses
      </a>
      <a class="nav-item" data-page="users.html" href="users.html">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Users
      </a>
      <a class="nav-item nav-owner-only" data-page="invites.html" href="invites.html">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
        Invite Codes
      </a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Account</div>
      <a class="nav-item" data-page="settings.html" href="settings.html">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </a>
    </div>
    <div class="sidebar-bottom">
      <div class="user-chip">
        <div class="user-avatar js-owner-initials">A</div>
        <div><div class="name js-owner-name">Admin</div><div class="role js-role-label">Owner</div></div>
        <svg onclick="logout()" title="Logout" style="margin-left:auto;cursor:pointer;color:var(--text-muted);" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </div>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <button id="sidebar-toggle" class="btn btn-icon btn-ghost" style="display:none">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="topbar-title">Users</span>
    </header>

    <div class="page-content">
      <div class="page-header">
        <div><h1>Users</h1><p>View and manage all authenticated users across your apps.</p></div>
      </div>

      <!-- Filters -->
      <div class="flex gap-3 mb-4" style="flex-wrap:wrap;">
        <div class="search-bar" style="flex:1;min-width:200px;">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="user-search" class="input" placeholder="Search username, email, IP…" oninput="renderUsers()"/>
        </div>
        <select id="user-filter" class="select" style="width:150px;" onchange="renderUsers()">
          <option value="">All Users</option>
          <option value="banned">Banned</option>
          <option value="active">Active</option>
        </select>
      </div>

      <div class="card" style="padding:0;">
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Username</th><th>Email</th><th>Level</th><th>IP Address</th><th>Status</th><th>Last Seen</th><th>Actions</th></tr>
            </thead>
            <tbody id="user-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- User detail modal -->
<div class="modal-overlay" id="modal-user-detail">
  <div class="modal" style="max-width:480px;">
    <div class="modal-header">
      <span class="modal-title" id="ud-title">User Detail</span>
      <button class="modal-close" data-close-modal="modal-user-detail">✕</button>
    </div>
    <div class="grid-2 mb-4">
      <div class="card" style="padding:.85rem;">
        <div class="text-muted text-xs mb-1">USERNAME</div>
        <div class="font-semibold" id="ud-username">—</div>
      </div>
      <div class="card" style="padding:.85rem;">
        <div class="text-muted text-xs mb-1">STATUS</div>
        <div id="ud-status-badge">—</div>
      </div>
    </div>
    <div class="form-group"><label>Email</label><input id="ud-email" class="input" readonly/></div>
    <div class="form-group"><label>IP Address</label>
      <div class="copy-field"><input id="ud-ip" class="input" readonly/><button class="btn btn-ghost btn-sm" onclick="copyText(document.getElementById('ud-ip').value,'IP')">Copy</button></div>
    </div>
    <div class="form-group"><label>HWID</label>
      <div class="copy-field"><input id="ud-hwid" class="input" readonly style="font-size:.75rem;"/><button class="btn btn-ghost btn-sm" onclick="copyText(document.getElementById('ud-hwid').value,'HWID')">Copy</button></div>
    </div>
    <div class="form-group">
      <label>Level</label>
      <select id="ud-level" class="select">
        <option value="1">Level 1</option><option value="2">Level 2</option><option value="3">Level 3</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="ud-ban-btn" onclick="toggleBan()">Ban</button>
      <button class="btn btn-ghost btn-sm" onclick="resetHwid()">Reset HWID</button>
      <button class="btn btn-ghost" data-close-modal="modal-user-detail">Close</button>
      <button class="btn btn-primary" onclick="saveUser()">Save</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="app.js"></script>
<script>
function logout() { DB.del('la_authed'); window.location.href = 'login.html'; }

let currentUserId = null;

function renderUsers() {
  const users  = DB.get('la_users', []);
  const search = document.getElementById('user-search').value.toLowerCase();
  const filter = document.getElementById('user-filter').value;
  const tbody  = document.getElementById('user-tbody');

  let rows = users;
  if (search) rows = rows.filter(u => u.username.toLowerCase().includes(search) || u.email.toLowerCase().includes(search) || (u.ip||'').includes(search));
  if (filter === 'banned') rows = rows.filter(u => u.banned);
  if (filter === 'active') rows = rows.filter(u => !u.banned);

  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="7" class="text-muted text-sm" style="padding:1.5rem;text-align:center;">No users found.</td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(u => `
    <tr>
      <td>
        <div class="flex items-center gap-2">
          <div style="width:28px;height:28px;border-radius:50%;background:var(--blue-dim);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:var(--blue-light);flex-shrink:0;">${u.username[0].toUpperCase()}</div>
          <span class="font-semibold">${u.username}</span>
        </div>
      </td>
      <td class="text-dim text-sm">${u.email}</td>
      <td><span class="badge badge-blue">Lvl ${u.level}</span></td>
      <td class="text-dim text-sm">${u.ip || '—'}</td>
      <td>${u.banned ? '<span class="badge badge-red">Banned</span>' : '<span class="badge badge-green">Active</span>'}</td>
      <td class="text-muted text-sm">${fmtDateShort(u.lastSeen)}</td>
      <td>
        <button class="btn btn-ghost btn-sm" onclick="openUserDetail('${u.id}')">Manage</button>
      </td>
    </tr>`).join('');
}

function openUserDetail(id) {
  const users = DB.get('la_users', []);
  const u = users.find(x => x.id === id);
  if (!u) return;
  currentUserId = id;
  document.getElementById('ud-title').textContent  = `User: ${u.username}`;
  document.getElementById('ud-username').textContent = u.username;
  document.getElementById('ud-email').value  = u.email;
  document.getElementById('ud-ip').value     = u.ip || '';
  document.getElementById('ud-hwid').value   = u.hwid || '';
  document.getElementById('ud-level').value  = u.level;
  document.getElementById('ud-status-badge').innerHTML = u.banned ? '<span class="badge badge-red">Banned</span>' : '<span class="badge badge-green">Active</span>';
  const banBtn = document.getElementById('ud-ban-btn');
  banBtn.textContent = u.banned ? 'Unban' : 'Ban';
  banBtn.className   = u.banned ? 'btn btn-success btn-sm' : 'btn btn-danger btn-sm';
  openModal('modal-user-detail');
}

function saveUser() {
  const users = DB.get('la_users', []);
  const idx = users.findIndex(u => u.id === currentUserId);
  if (idx < 0) return;
  users[idx].level = parseInt(document.getElementById('ud-level').value);
  DB.set('la_users', users);
  toast('User saved', 'success');
  closeModal('modal-user-detail');
  renderUsers();
}

function toggleBan() {
  const users = DB.get('la_users', []);
  const idx = users.findIndex(u => u.id === currentUserId);
  if (idx < 0) return;
  users[idx].banned = !users[idx].banned;
  DB.set('la_users', users);
  toast(users[idx].banned ? 'User banned' : 'User unbanned', users[idx].banned ? 'error' : 'success');
  closeModal('modal-user-detail');
  renderUsers();
}

function resetHwid() {
  const users = DB.get('la_users', []);
  const idx = users.findIndex(u => u.id === currentUserId);
  if (idx < 0) return;
  users[idx].hwid = uuidv4();
  DB.set('la_users', users);
  document.getElementById('ud-hwid').value = users[idx].hwid;
  toast('HWID reset', 'success');
}

document.addEventListener('DOMContentLoaded', renderUsers);
</script>
</body>
</html>
